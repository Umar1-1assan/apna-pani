<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom scrollbar for modal content */
        .modal-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .modal-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-scroll::-webkit-scrollbar-thumb {
            background-color: #c1c6d7;
            border-radius: 20px;
            border: 3px solid transparent;
            background-clip: padding-box;
        }
    </style>
</head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden font-body-md relative">
<!-- Background Layer (Simulating the screen behind the overlay) -->
<div class="absolute inset-0 z-0 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBbYdunogM34hd_k2wtAMzY3W0m6s_ejm97daD5tFddIewv1MkWLaWUu4CAHvgEju6JZSgQhEfWgcq8D-dgGFvTTXVIG320VZfuiuj1kQNxHJAfR2rTKGW9it6Y5G37ZA3oFOymupbY9Zfx-_iWcPNyDhbytno4TqVq40bq1EAHDgNOlBwRR730cuwDTbFcMNDrCDERHj-7K2vQtp0pS9e_oyh9xk3OvThbOxbDIPEPEMwbUe2vNUQY97gAxaBrB_ORGN3k7-2I3To'); filter: blur(2px);">
<!-- Fallback background if image fails -->
<div class="w-full h-full bg-surface-container opacity-80"></div>
</div>
<!-- Backdrop Overlay -->
<div class="absolute inset-0 z-40 bg-on-background/40 backdrop-blur-sm flex items-center justify-center p-margin-mobile md:p-gutter transition-opacity duration-300">
<!-- Modal Container (Level 2 Elevation) -->
<div class="bg-surface-container-lowest w-full max-w-4xl rounded-xl shadow-[0_12px_24px_rgba(11,28,48,0.1)] flex flex-col max-h-[972px] transform transition-all scale-100 opacity-100">
<!-- Modal Header -->
<div class="flex justify-between items-center px-gutter py-4 border-b border-outline-variant/50 bg-surface-container-lowest rounded-t-xl shrink-0">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Update Customer</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Modify details for Alice Brown</p>
</div>
<button aria-label="Close modal" class="p-2 rounded-full text-on-surface-variant hover:bg-surface-variant hover:text-on-surface transition-colors flex items-center justify-center cursor-pointer">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="px-gutter py-6 overflow-y-auto modal-scroll grow bg-surface-container-lowest">
<form class="grid grid-cols-1 md:grid-cols-2 gap-x-gutter gap-y-6">
<!-- Section: Account Information -->
<div class="md:col-span-2">
<h3 class="font-label-md text-label-md text-secondary uppercase tracking-wider mb-4 border-b border-outline-variant/30 pb-2">Account Credentials</h3>
</div>
<!-- Username -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface mb-unit" for="username">Username</label>
<input class="w-full border border-outline-variant rounded-lg bg-surface-container-lowest px-3 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="username" readonly="" type="text" value="alicebrown"/>
<p class="font-label-md text-label-md text-secondary mt-1">Username cannot be changed.</p>
</div>
<!-- Password -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface mb-unit" for="password">Password</label>
<div class="relative flex items-center">
<input class="w-full border border-outline-variant rounded-lg bg-surface-container-lowest pl-3 pr-24 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" disabled="" id="password" type="password" value="********"/>
<button class="absolute right-2 font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant px-2 py-1 rounded hover:bg-surface-variant transition-colors cursor-pointer" type="button">
                                Change
                            </button>
</div>
</div>
<!-- Section: Personal Details -->
<div class="md:col-span-2 mt-2">
<h3 class="font-label-md text-label-md text-secondary uppercase tracking-wider mb-4 border-b border-outline-variant/30 pb-2">Personal &amp; Contact Details</h3>
</div>
<!-- Full Name -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface mb-unit" for="fullName">Full Name</label>
<input class="w-full border border-outline-variant rounded-lg bg-surface-container-lowest px-3 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="fullName" type="text" value="Alice Brown"/>
</div>
<!-- Email -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface mb-unit" for="email">Email Address</label>
<input class="w-full border border-outline-variant rounded-lg bg-surface-container-lowest px-3 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="email" type="email" value="alice.brown@example.com"/>
</div>
<!-- Contact Number -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface mb-unit" for="contact">Contact Number</label>
<input class="w-full border border-outline-variant rounded-lg bg-surface-container-lowest px-3 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="contact" type="tel" value="+1 555-0192"/>
</div>
<!-- Delivery Address -->
<div class="flex flex-col md:col-span-2">
<label class="font-label-md text-label-md text-on-surface mb-unit" for="address">Delivery Address</label>
<input class="w-full border border-outline-variant rounded-lg bg-surface-container-lowest px-3 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="address" type="text" value="123 Aqua Lane, Suburbia, Metro District"/>
</div>
<!-- Section: Logistics -->
<div class="md:col-span-2 mt-2">
<h3 class="font-label-md text-label-md text-secondary uppercase tracking-wider mb-4 border-b border-outline-variant/30 pb-2">Delivery Operations</h3>
</div>
<!-- Daily Water Count -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface mb-unit" for="waterCount">Daily Water Count (Bottles)</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-secondary">
<span class="material-symbols-outlined text-[18px]" data-icon="water_drop">water_drop</span>
</span>
<input class="w-full border border-outline-variant rounded-lg bg-surface-container-lowest pl-10 pr-3 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="waterCount" min="1" type="number" value="3"/>
</div>
</div>
<!-- Assigned Rider -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface mb-unit" for="assignedRider">Assigned Rider</label>
<div class="relative">
<select class="w-full border border-outline-variant rounded-lg bg-surface-container-lowest px-3 py-2.5 font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm cursor-pointer" id="assignedRider">
<option value="unassigned">Unassigned</option>
<option selected="" value="rider1">John Doe (Route A)</option>
<option value="rider2">Sarah Smith (Route B)</option>
<option value="rider3">Mike Johnson (Route C)</option>
</select>
<span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</span>
</div>
</div>
<!-- Delivery Notes -->
<div class="flex flex-col md:col-span-2">
<label class="font-label-md text-label-md text-on-surface mb-unit" for="notes">Delivery Notes</label>
<textarea class="w-full border border-outline-variant rounded-lg bg-surface-container-lowest px-3 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm resize-none" id="notes" rows="3">Leave at side gate, beware of dog.</textarea>
</div>
<!-- Status Toggle -->
<div class="flex flex-col md:col-span-2 mt-2">
<label class="font-label-md text-label-md text-on-surface mb-unit">Account Status</label>
<div class="flex items-center gap-4 bg-surface-container-low p-4 rounded-lg border border-outline-variant/30">
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
<span class="ml-3 font-body-md text-body-md text-on-surface">Active Customer</span>
</label>
</div>
</div>
</form>
</div>
<!-- Modal Footer -->
<div class="flex flex-col md:flex-row justify-between items-center px-gutter py-4 border-t border-outline-variant/50 bg-surface rounded-b-xl shrink-0 gap-4">
<!-- Delete Action (Left/Bottom on mobile) -->
<div class="w-full md:w-auto order-2 md:order-1">
<button class="w-full md:w-auto flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-error hover:bg-error-container/50 font-label-md text-label-md transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-[20px] group-hover:scale-110 transition-transform" data-icon="delete">delete</span>
                        Delete Customer
                    </button>
</div>
<!-- Primary Actions (Right/Top on mobile) -->
<div class="flex items-center gap-3 w-full md:w-auto order-1 md:order-2 justify-end">
<button class="px-6 py-2 rounded-lg border border-outline-variant text-secondary font-label-md text-label-md hover:bg-surface-variant hover:text-on-surface transition-colors cursor-pointer bg-surface-container-lowest">
                        Cancel
                    </button>
<button class="px-6 py-2 rounded-lg bg-primary text-on-primary font-label-md text-label-md hover:bg-on-primary-fixed-variant transition-colors shadow-sm flex items-center gap-2 cursor-pointer">
<span class="material-symbols-outlined text-[20px]" data-icon="save">save</span>
                        Update Customer
                    </button>
</div>
</div>
</div>
</div>
</body></html>
