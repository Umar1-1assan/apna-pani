<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AquaFlow - Filter Deliveries</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#001f26",
                        "outline-variant": "#c1c6d7",
                        "on-secondary-container": "#556679",
                        "surface-container-low": "#eff4ff",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary-container": "#006fef",
                        "secondary": "#4f6073",
                        "on-background": "#0b1c30",
                        "secondary-container": "#d2e4fb",
                        "primary": "#0058bf",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "primary-fixed": "#d8e2ff",
                        "tertiary": "#006577",
                        "on-surface-variant": "#414755",
                        "on-secondary-fixed-variant": "#38485a",
                        "on-surface": "#0b1c30",
                        "outline": "#727786",
                        "inverse-on-surface": "#eaf1ff",
                        "secondary-fixed": "#d2e4fb",
                        "on-primary-fixed-variant": "#004396",
                        "surface-dim": "#cbdbf5",
                        "surface-container-highest": "#d3e4fe",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001a42",
                        "tertiary-fixed": "#acedff",
                        "inverse-surface": "#213145",
                        "surface-variant": "#d3e4fe",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "surface-container-high": "#dce9ff",
                        "surface-bright": "#f8f9ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#aec6ff",
                        "on-primary-container": "#fefcff",
                        "on-secondary-fixed": "#0b1d2d",
                        "inverse-primary": "#aec6ff",
                        "secondary-fixed-dim": "#b7c8de",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#008096",
                        "surface": "#f8f9ff",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#005ac4",
                        "background": "#f8f9ff",
                        "surface-container": "#e5eeff",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#f9fdff",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "unit": "4px",
                        "margin-desktop": "40px",
                        "margin-mobile": "16px",
                        "touch-target": "48px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-xl": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "data-tabular": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-xl": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "data-tabular": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md antialiased relative">
<!-- Mock Background (Delivery Logs Screen) -->
<div class="p-gutter opacity-40 select-none pointer-events-none filter blur-sm">
<h1 class="font-headline-xl text-headline-xl mb-6">Delivery Logs</h1>
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-6 shadow-sm">
<div class="h-10 bg-surface-container-low rounded mb-4"></div>
<div class="h-10 bg-surface-container-low rounded mb-4"></div>
<div class="h-10 bg-surface-container-low rounded mb-4"></div>
<div class="h-10 bg-surface-container-low rounded mb-4"></div>
<div class="h-10 bg-surface-container-low rounded"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-background/40 backdrop-blur-sm z-50 flex items-center justify-center p-margin-mobile md:p-gutter">
<!-- Modal Container (Level 2 Elevation) -->
<div class="bg-surface-container-lowest w-full max-w-2xl rounded-xl shadow-[0_12px_24px_rgba(0,0,0,0.1)] border border-outline-variant flex flex-col max-h-[921px] overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between p-6 border-b border-outline-variant shrink-0 bg-surface">
<h2 class="font-headline-md text-headline-md text-on-surface">Filter Deliveries</h2>
<button class="text-on-surface-variant hover:text-primary transition-colors p-2 -mr-2 rounded-full hover:bg-surface-variant" type="button">
<span aria-hidden="true" class="material-symbols-outlined">close</span>
<span class="sr-only">Close filters</span>
</button>
</div>
<!-- Body / Form Areas -->
<div class="p-6 overflow-y-auto grow space-y-8 bg-surface-container-lowest">
<!-- Date Range -->
<section>
<h3 class="font-label-md text-label-md text-on-surface mb-3 uppercase tracking-wider">Date Range</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="start_date">Start Date</label>
<div class="relative">
<span aria-hidden="true" class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">calendar_month</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="start_date" name="start_date" type="date"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="end_date">End Date</label>
<div class="relative">
<span aria-hidden="true" class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">calendar_month</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="end_date" name="end_date" type="date"/>
</div>
</div>
</div>
</section>
<hr class="border-outline-variant/50"/>
<!-- People Filters -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Customer Dropdown -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1 uppercase tracking-wider" for="customer_filter">Customer</label>
<div class="relative">
<span aria-hidden="true" class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
<select class="w-full pl-10 pr-10 py-2 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer" id="customer_filter">
<option disabled="" selected="" value="">Search customers...</option>
<option value="acme">Acme Corp</option>
<option value="globex">Globex Inc.</option>
<option value="soylent">Soylent Corp</option>
</select>
<span aria-hidden="true" class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Rider Dropdown -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1 uppercase tracking-wider" for="rider_filter">Rider</label>
<div class="relative">
<span aria-hidden="true" class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">directions_bike</span>
<select class="w-full pl-10 pr-10 py-2 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer" id="rider_filter">
<option disabled="" selected="" value="">Search riders...</option>
<option value="john_d">John Doe</option>
<option value="jane_s">Jane Smith</option>
<option value="mike_w">Mike Wallace</option>
</select>
<span aria-hidden="true" class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
</section>
<hr class="border-outline-variant/50"/>
<!-- Delivery Status (Chips) -->
<section>
<h3 class="font-label-md text-label-md text-on-surface mb-3 uppercase tracking-wider">Delivery Status</h3>
<div class="flex flex-wrap gap-2">
<!-- Delivered Chip -->
<label class="cursor-pointer group relative">
<input class="peer sr-only" name="status_delivered" type="checkbox" value="delivered"/>
<div class="px-4 py-1.5 rounded-full border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface-variant transition-all peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container peer-focus-visible:ring-2 peer-focus-visible:ring-primary peer-focus-visible:ring-offset-1 flex items-center gap-1.5 hover:bg-surface-variant">
<span aria-hidden="true" class="material-symbols-outlined text-[18px] opacity-0 w-0 -ml-2 overflow-hidden transition-all peer-checked:opacity-100 peer-checked:w-auto peer-checked:ml-0">check</span>
                                Delivered
                            </div>
</label>
<!-- Pending Chip -->
<label class="cursor-pointer group relative">
<input class="peer sr-only" name="status_pending" type="checkbox" value="pending"/>
<div class="px-4 py-1.5 rounded-full border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface-variant transition-all peer-checked:bg-secondary-container peer-checked:text-on-secondary-container peer-checked:border-secondary-container peer-focus-visible:ring-2 peer-focus-visible:ring-primary peer-focus-visible:ring-offset-1 flex items-center gap-1.5 hover:bg-surface-variant">
<span aria-hidden="true" class="material-symbols-outlined text-[18px] opacity-0 w-0 -ml-2 overflow-hidden transition-all peer-checked:opacity-100 peer-checked:w-auto peer-checked:ml-0">check</span>
                                Pending
                            </div>
</label>
<!-- Missed Chip -->
<label class="cursor-pointer group relative">
<input class="peer sr-only" name="status_missed" type="checkbox" value="missed"/>
<div class="px-4 py-1.5 rounded-full border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface-variant transition-all peer-checked:bg-error-container peer-checked:text-on-error-container peer-checked:border-error-container peer-focus-visible:ring-2 peer-focus-visible:ring-primary peer-focus-visible:ring-offset-1 flex items-center gap-1.5 hover:bg-surface-variant">
<span aria-hidden="true" class="material-symbols-outlined text-[18px] opacity-0 w-0 -ml-2 overflow-hidden transition-all peer-checked:opacity-100 peer-checked:w-auto peer-checked:ml-0">check</span>
                                Missed
                            </div>
</label>
<!-- Cancelled Chip -->
<label class="cursor-pointer group relative">
<input class="peer sr-only" name="status_cancelled" type="checkbox" value="cancelled"/>
<div class="px-4 py-1.5 rounded-full border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface-variant transition-all peer-checked:bg-surface-container-highest peer-checked:text-on-surface peer-checked:border-outline peer-focus-visible:ring-2 peer-focus-visible:ring-primary peer-focus-visible:ring-offset-1 flex items-center gap-1.5 hover:bg-surface-variant">
<span aria-hidden="true" class="material-symbols-outlined text-[18px] opacity-0 w-0 -ml-2 overflow-hidden transition-all peer-checked:opacity-100 peer-checked:w-auto peer-checked:ml-0">check</span>
                                Cancelled
                            </div>
</label>
</div>
</section>
<hr class="border-outline-variant/50"/>
<!-- Bottle Count -->
<section>
<h3 class="font-label-md text-label-md text-on-surface mb-3 uppercase tracking-wider">Bottle Count Range</h3>
<div class="flex items-center gap-4">
<div class="flex-1">
<label class="sr-only" for="min_bottles">Minimum Bottles</label>
<input class="w-full px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-center" id="min_bottles" min="0" name="min_bottles" placeholder="Min" type="number"/>
</div>
<span class="text-outline-variant font-body-md">—</span>
<div class="flex-1">
<label class="sr-only" for="max_bottles">Maximum Bottles</label>
<input class="w-full px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-center" id="max_bottles" min="0" name="max_bottles" placeholder="Max" type="number"/>
</div>
</div>
</section>
</div>
<!-- Footer Actions -->
<div class="p-6 border-t border-outline-variant bg-surface flex justify-between items-center shrink-0">
<button class="font-label-md text-label-md text-primary hover:text-primary-container px-4 py-2 transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-DEFAULT" type="button">
                    Reset Filters
                </button>
<div class="flex gap-3">
<button class="font-label-md text-label-md text-on-surface border border-outline-variant bg-surface-container-lowest hover:bg-surface-variant px-6 py-2.5 rounded-DEFAULT transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
                        Cancel
                    </button>
<button class="font-label-md text-label-md text-on-primary bg-primary hover:bg-[#004ca8] px-6 py-2.5 rounded-DEFAULT transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 flex items-center gap-2" type="button">
<span aria-hidden="true" class="material-symbols-outlined text-[18px]">filter_list</span>
                        Apply Filters
                    </button>
</div>
</div>
</div>
</div>
</body></html>
