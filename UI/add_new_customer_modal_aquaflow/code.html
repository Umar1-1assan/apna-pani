<body class="bg-surface text-on-surface font-body-md min-h-screen overflow-hidden">

<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-on-background/40 backdrop-blur-md">
<!-- Modal Container -->
<div class="w-full max-w-3xl bg-surface-container-lowest rounded-xl shadow-[0_12px_24px_-12px_rgba(0,0,0,0.1)] border border-outline-variant flex flex-col max-h-full modal-animate">
<!-- Modal Header -->
<div class="flex justify-between items-center p-6 border-b border-outline-variant shrink-0">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary-container text-on-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Add New Customer</h2>
<p class="font-body-md text-body-md text-secondary mt-1">Enter details to register a new water delivery client.</p>
</div>
</div>
<button aria-label="Close modal" class="p-2 text-secondary hover:text-on-surface hover:bg-surface-variant rounded-full transition-colors self-start">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="p-6 overflow-y-auto custom-scrollbar flex flex-col gap-8">
<!-- Section 1: Login Credentials -->
<section>
<h3 class="font-label-md text-label-md text-primary uppercase tracking-wider mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="login">login</span>
                        Login Credentials
                    </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-surface p-4 rounded-lg border border-outline-variant/50">
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant">Username</label>
<input class="w-full h-touch-target px-3 rounded border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md" placeholder="e.g. john_doe_waters" type="text"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant">Password</label>
<div class="flex gap-2">
<input class="w-full h-touch-target px-3 rounded border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md flex-1" type="password" value="temp_pass_123"/>
<button class="h-touch-target px-4 rounded border border-primary text-primary hover:bg-surface-variant transition-colors font-label-md text-label-md shrink-0 flex items-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="autorenew">autorenew</span>
                                    Generate
                                </button>
</div>
</div>
</div>
</section>
<!-- Section 2: Customer Details -->
<section>
<h3 class="font-label-md text-label-md text-primary uppercase tracking-wider mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="badge">badge</span>
                        Customer Details
                    </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface-variant">Full Name / Company Name</label>
<input class="w-full h-touch-target px-3 rounded border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md" placeholder="Enter full name" type="text"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant">Email Address</label>
<input class="w-full h-touch-target px-3 rounded border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md" placeholder="contact@example.com" type="email"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant">Contact Number</label>
<input class="w-full h-touch-target px-3 rounded border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
</section>
<!-- Section 3: Delivery Information -->
<section>
<h3 class="font-label-md text-label-md text-primary uppercase tracking-wider mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="local_shipping">local_shipping</span>
                        Delivery Information
                    </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface-variant">Delivery Address</label>
<textarea class="w-full p-3 rounded border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md resize-none" placeholder="Full street address..." rows="2"></textarea>
</div>
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface-variant">Address Notes (Optional)</label>
<input class="w-full h-touch-target px-3 rounded border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md" placeholder="e.g. Leave by the back door, gate code 1234" type="text"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant">Daily Water Bottle Count (20L)</label>
<div class="relative">
<input class="w-full h-touch-target pl-10 pr-3 rounded border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md" min="1" type="number" value="2"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary" data-icon="water_drop">water_drop</span>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant">Assigned Rider</label>
<div class="relative">
<select class="w-full h-touch-target pl-3 pr-10 appearance-none rounded border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md">
<option disabled="" selected="" value="">Select a rider...</option>
<option value="r1">Michael Chang (Zone A)</option>
<option value="r2">Sarah Jenkins (Zone B)</option>
<option value="r3">David Rodriguez (Zone C)</option>
<option value="auto">Auto-assign based on route</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-secondary pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Section 4: Status -->
<section class="bg-surface-container-low p-4 rounded-lg flex items-center justify-between border border-outline-variant/30">
<div>
<h4 class="font-label-md text-label-md text-on-surface">Account Status</h4>
<p class="font-body-md text-body-md text-secondary text-xs mt-1">Set whether this customer is immediately active for deliveries.</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
<span class="ml-3 font-label-md text-label-md text-on-surface">Active</span>
</label>
</section>
</div>
<!-- Modal Footer -->
<div class="p-6 border-t border-outline-variant flex justify-end gap-4 shrink-0 bg-surface-container-lowest rounded-b-xl">
<button class="h-touch-target px-6 rounded border border-outline-variant text-on-surface hover:bg-surface-variant transition-colors font-label-md text-label-md flex items-center justify-center" type="button">
                    Cancel
                </button>
<button class="h-touch-target px-6 rounded bg-primary text-on-primary hover:bg-primary/90 transition-colors font-label-md text-label-md shadow-sm flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="person_add">person_add</span>
                    Create Customer
                </button>
</div>
</div>
</div>
