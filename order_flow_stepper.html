
<h2 class="sr-only">Interactive order flow stepper showing each stage from all three roles: customer, owner, and rider</h2>
<style>
.stepper{padding:1rem 0}
.progress-bar{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.pip{height:4px;border-radius:2px;flex:1;min-width:18px;background:var(--color-border-tertiary);transition:background .3s}
.pip.done{background:var(--color-text-success)}
.pip.active{background:var(--color-text-info)}
.step-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.step-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary)}
.step-num.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.step-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.step-subtitle{font-size:12px;color:var(--color-text-tertiary);margin-top:2px}
.role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:1rem}
.role-card{border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);padding:12px 14px;background:var(--color-background-primary)}
.role-label{font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.role-label i{font-size:14px}
.role-label.customer{color:var(--color-text-success)}
.role-label.owner{color:#7F77DD}
.role-label.rider{color:#BA7517}
.role-body{font-size:13px;color:var(--color-text-secondary);line-height:1.55}
.role-card.highlight{background:var(--color-background-secondary)}
.notif-row{margin-top:10px;padding:8px 10px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);font-size:12px;color:var(--color-text-secondary);display:flex;align-items:flex-start;gap:8px}
.notif-row i{font-size:14px;flex-shrink:0;margin-top:1px}
.nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem;gap:12px}
.nav button{font-size:13px;padding:6px 16px}
.nav .counter{font-size:12px;color:var(--color-text-tertiary)}
</style>

<div class="stepper">
  <div class="progress-bar" id="progress"></div>
  <div class="step-header">
    <div class="step-num active" id="step-num">1</div>
    <div>
      <div class="step-title" id="step-title"></div>
      <div class="step-subtitle" id="step-sub"></div>
    </div>
  </div>
  <div class="role-grid" id="role-grid"></div>
  <div id="notif-area"></div>
  <div class="nav">
    <button id="btn-prev" onclick="move(-1)">← Previous</button>
    <span class="counter" id="counter"></span>
    <button id="btn-next" onclick="move(1)">Next →</button>
  </div>
</div>

<script>
const steps = [
  {
    title: "Customer places order",
    sub: "App / WhatsApp / phone call",
    roles: [
      { role:"customer", label:"Customer", icon:"ti-user", active:true,
        body:"Opens app or WhatsApp. Selects product (19L carboy, refill, or bottles), enters quantity, picks delivery address from saved list or drops a map pin. Chooses date and preferred time slot (morning / afternoon / evening). Adds any special instructions e.g. 'call before arriving'. Taps Confirm Order." },
      { role:"owner", label:"Owner / admin", icon:"ti-building-store", active:false,
        body:"No action required yet. New order appears instantly in the admin order queue with status: Pending." },
      { role:"rider", label:"Rider", icon:"ti-motorbike", active:false,
        body:"No action yet. Rider is unaware until assignment." }
    ],
    notif: { icon:"ti-bell", text:"System auto-generates Order ID and sends WhatsApp confirmation to customer: 'Order #1042 received — 3 carboys on [date].'" }
  },
  {
    title: "Invoice is generated",
    sub: "Automatic — no manual work needed",
    roles: [
      { role:"customer", label:"Customer", icon:"ti-user", active:true,
        body:"Receives invoice via WhatsApp with: Order ID, product name, quantity, unit price (PKR), total amount, payment method (Cash on Delivery), and due on delivery note." },
      { role:"owner", label:"Owner / admin", icon:"ti-building-store", active:true,
        body:"Invoice auto-created in the system with a sequential number (INV-1042). Visible in the Invoices section. Status: Unpaid. Owner can review, edit if needed, or add a note." },
      { role:"rider", label:"Rider", icon:"ti-motorbike", active:false,
        body:"No action yet." }
    ],
    notif: { icon:"ti-file-invoice", text:"Invoice sent to customer over WhatsApp as a PDF link or formatted message. Shows full breakdown in PKR." }
  },
  {
    title: "Owner reviews & assigns rider",
    sub: "Manual assignment by admin",
    roles: [
      { role:"customer", label:"Customer", icon:"ti-user", active:false,
        body:"Waiting. No action needed." },
      { role:"owner", label:"Owner / admin", icon:"ti-building-store", active:true,
        body:"Opens the order queue. Sees the new order with customer name, area, time slot, and quantity. Checks which rider is available and covers that zone. Taps Assign Rider and selects the rider from the list. Can view each rider's current load count before assigning. Taps Confirm Assignment." },
      { role:"rider", label:"Rider", icon:"ti-motorbike", active:false,
        body:"About to receive notification." }
    ],
    notif: { icon:"ti-arrow-right", text:"Order status changes from Pending → Assigned. System records which rider was assigned and at what time." }
  },
  {
    title: "Rider receives & reviews order",
    sub: "Push notification on rider app",
    roles: [
      { role:"customer", label:"Customer", icon:"ti-user", active:false,
        body:"Receives WhatsApp message: 'Your order has been assigned to [Rider Name]. Expected delivery: [time slot].'" },
      { role:"owner", label:"Owner / admin", icon:"ti-building-store", active:false,
        body:"Assignment complete. Owner's dashboard shows order as Assigned with rider name." },
      { role:"rider", label:"Rider", icon:"ti-motorbike", active:true,
        body:"Gets a push notification: 'New delivery assigned — Order #1042, 3 carboys, G-9 Markaz'. Opens the rider app. Sees full order card: customer name, phone number, delivery address, quantity, COD amount in PKR, and time slot. Can tap the phone number to call the customer directly if needed." }
    ],
    notif: { icon:"ti-device-mobile", text:"Rider app shows COD amount prominently so rider knows exactly how much cash to collect at the door." }
  },
  {
    title: "Rider plans delivery route",
    sub: "Before leaving the warehouse",
    roles: [
      { role:"customer", label:"Customer", icon:"ti-user", active:false,
        body:"Waiting for delivery." },
      { role:"owner", label:"Owner / admin", icon:"ti-building-store", active:false,
        body:"Can monitor how many stops rider has for the day from dashboard." },
      { role:"rider", label:"Rider", icon:"ti-motorbike", active:true,
        body:"Opens the Route screen. Sees all assigned stops for the day pinned on the map. System suggests an optimized delivery order. Rider can drag and reorder stops manually — e.g. to avoid a traffic-heavy road or to group nearby stops. Taps Start Route. Navigation button opens Google Maps for each stop." }
    ],
    notif: { icon:"ti-map-pin", text:"Rider marks themselves as 'Out for delivery'. Order status updates to: In Transit." }
  },
  {
    title: "Rider arrives at customer location",
    sub: "On-ground delivery step",
    roles: [
      { role:"customer", label:"Customer", icon:"ti-user", active:true,
        body:"Receives WhatsApp: 'Your rider is nearby — please be available.' Customer prepares payment (cash) and any empty carboys to return." },
      { role:"owner", label:"Owner / admin", icon:"ti-building-store", active:false,
        body:"Dashboard shows order status: Arrived." },
      { role:"rider", label:"Rider", icon:"ti-motorbike", active:true,
        body:"Taps 'Arrived' on the app when reaching the address. Unloads the correct number of carboys from the bike. Hands over bottles to the customer. Collects empty carboys (if any) from the customer and logs the count in the app." }
    ],
    notif: { icon:"ti-package", text:"Carboy return count is logged automatically per customer. This feeds into the inventory reconciliation at end of day." }
  },
  {
    title: "COD payment is collected",
    sub: "Cash / Easypaisa / JazzCash",
    roles: [
      { role:"customer", label:"Customer", icon:"ti-user", active:true,
        body:"Hands over the exact cash amount shown on the invoice. Or sends via Easypaisa / JazzCash to the company number. Amount must match the invoice total in PKR." },
      { role:"owner", label:"Owner / admin", icon:"ti-building-store", active:false,
        body:"No action needed at this moment. Will verify during end-of-day reconciliation." },
      { role:"rider", label:"Rider", icon:"ti-motorbike", active:true,
        body:"Enters the cash amount received into the app. If paid via Easypaisa, takes a screenshot and uploads it. Taps 'Payment Collected'. App adds this amount to the running COD total for the day." }
    ],
    notif: { icon:"ti-cash", text:"If customer is a credit/postpaid account, rider skips the payment step and marks 'Delivered — to be billed' instead." }
  },
  {
    title: "Delivery confirmed",
    sub: "Order closed, receipt sent",
    roles: [
      { role:"customer", label:"Customer", icon:"ti-user", active:true,
        body:"Receives WhatsApp receipt: 'Order #1042 delivered. Amount paid: PKR 1,200. Thank you!' Also receives a prompt to rate the delivery (1–5 stars). Can tap 'Reorder same' for next time." },
      { role:"owner", label:"Owner / admin", icon:"ti-building-store", active:true,
        body:"Order status moves to: Delivered. Invoice status moves to: Paid. Revenue figure on the dashboard updates immediately. Owner can see delivery time, payment method, and any notes." },
      { role:"rider", label:"Rider", icon:"ti-motorbike", active:true,
        body:"Taps 'Delivery Complete'. Optionally takes a photo as delivery proof. Order is removed from the active list. Rider's completed count increments by 1. Moves on to the next stop on the route." }
    ],
    notif: { icon:"ti-circle-check", text:"All three parties see the order as closed. The system locks the invoice and logs the timestamp of delivery." }
  },
  {
    title: "Failed delivery (exception flow)",
    sub: "Customer not available or refused",
    roles: [
      { role:"customer", label:"Customer", icon:"ti-user", active:false,
        body:"Receives a missed delivery SMS/WhatsApp: 'We tried to deliver your order but no one was available. We will reschedule — please call us.'" },
      { role:"owner", label:"Owner / admin", icon:"ti-building-store", active:true,
        body:"Gets an alert: 'Delivery failed — Order #1042, reason: Not home'. Owner calls the customer to reschedule. Creates a new delivery attempt, reassigns to rider for next day or next available slot." },
      { role:"rider", label:"Rider", icon:"ti-motorbike", active:true,
        body:"Taps 'Delivery Failed'. Selects reason from list: Not home / Door locked / Customer refused / Wrong address. Brings the carboys back to the warehouse. The failed attempt is logged with timestamp." }
    ],
    notif: { icon:"ti-alert-triangle", text:"Failed deliveries are tracked per rider and per customer. Repeated failures on the same customer are flagged for the owner." }
  },
  {
    title: "End-of-day reconciliation",
    sub: "Cash settlement between rider and owner",
    roles: [
      { role:"customer", label:"Customer", icon:"ti-user", active:false,
        body:"No action. All their orders are settled." },
      { role:"owner", label:"Owner / admin", icon:"ti-building-store", active:true,
        body:"Opens the Rider Cash Report. Sees total expected COD collected by each rider today. Rider physically hands over the cash. Owner marks it as 'Received' in the system. Any discrepancy is flagged immediately. Empty carboys returned by rider are counted and logged back into inventory." },
      { role:"rider", label:"Rider", icon:"ti-motorbike", active:true,
        body:"Submits end-of-day cash report from the app showing: total deliveries, total COD collected, total empties returned. Physically hands cash to owner or deposits to company account." }
    ],
    notif: { icon:"ti-report-money", text:"The system auto-generates a daily settlement report in PDF that owner can save or share for accounting records." }
  }
];

let cur = 0;

function render() {
  const s = steps[cur];
  const total = steps.length;

  document.getElementById('step-num').textContent = cur + 1;
  document.getElementById('step-title').textContent = s.title;
  document.getElementById('step-sub').textContent = s.sub;

  const prog = document.getElementById('progress');
  prog.innerHTML = steps.map((_, i) =>
    `<div class="pip ${i < cur ? 'done' : i === cur ? 'active' : ''}"></div>`
  ).join('');

  const roleColors = { customer:'customer', owner:'owner', rider:'rider' };
  document.getElementById('role-grid').innerHTML = s.roles.map(r => `
    <div class="role-card ${r.active ? 'highlight' : ''}">
      <div class="role-label ${roleColors[r.role]}">
        <i class="ti ${r.icon}" aria-hidden="true"></i>${r.label}
      </div>
      <div class="role-body">${r.body}</div>
    </div>
  `).join('');

  document.getElementById('notif-area').innerHTML = s.notif ? `
    <div class="notif-row">
      <i class="ti ${s.notif.icon}" aria-hidden="true"></i>
      <span>${s.notif.text}</span>
    </div>` : '';

  document.getElementById('counter').textContent = `Step ${cur + 1} of ${total}`;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === total - 1;
  document.getElementById('btn-next').textContent = cur === total - 1 ? 'Done' : 'Next →';
}

function move(dir) {
  const next = cur + dir;
  if (next >= 0 && next < steps.length) { cur = next; render(); }
}

render();
</script>
